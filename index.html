<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Tour Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #0061ff; --bg-color: #f8f9fa; }
        body { background-color: var(--bg-color); font-family: 'Inter', sans-serif; }
        .navbar { background: linear-gradient(135deg, #0061ff 0%, #60efff 100%); border-bottom: none; }
        .nav-pills .nav-link.active { background-color: var(--primary-color); box-shadow: 0 4px 10px rgba(0,97,255,0.3); }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .progress { height: 10px; border-radius: 5px; background-color: #e9ecef; }
        .btn-primary { background-color: var(--primary-color); border: none; border-radius: 8px; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner-border text-primary" role="status"></div></div>

    <nav class="navbar navbar-dark shadow-sm mb-4">
        <div class="container text-center py-2"><span class="navbar-brand mb-0 h1 mx-auto fw-bold">ADRIATIC TOURS</span></div>
    </nav>

    <div class="container">
        <!-- TABS -->
        <ul class="nav nav-pills justify-content-center mb-4" id="pills-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active" onclick="showSection('op')">OPERATER</button></li>
            <li class="nav-item ms-2"><button class="nav-link" onclick="showSection('ad')">ADMINISTRACIJA</button></li>
        </ul>

        <!-- OPERATER -->
        <div id="sec-op">
            <div class="row g-3" id="cardsContainer">
                <div class="col-12 text-center text-muted py-5">Učitavanje današnjih tura...</div>
            </div>
        </div>

        <!-- ADMIN -->
        <div id="sec-ad" style="display:none">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0">Tjedni raspored (Predložak)</h5>
                    <button class="btn btn-success fw-bold" onclick="generateWeek()">GENERIRAJ TJEDAN</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center">
                        <thead class="table-light">
                            <tr><th>Tura / Vrijeme</th><th>P</th><th>U</th><th>S</th><th>Č</th><th>P</th><th>S</th><th>N</th></tr>
                        </thead>
                        <tbody id="adminTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwOgdJMjLPlxftWPqBY21nQK0aZQU3pc1i8XHugfmXXiEj-zQYJwo2miXrtvjzRslJ4xA/exec"; // <-- ZAMIJENI OVO!

        async function apiCall(data) {
            document.getElementById('loader').style.display = 'flex';
            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                const res = await r.json();
                return res;
            } catch (e) { alert("Greška: " + e); return null; }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        async function loadOperater() {
            const res = await apiCall({ action: "getTodayTours" });
            const container = document.getElementById('cardsContainer');
            if(!res || res.data.length === 0) {
                container.innerHTML = '<div class="col-12 text-center py-5 text-muted">Nema aktivnih tura za danas. Provjerite "Raspored" u Sheetu.</div>';
                return;
            }
            container.innerHTML = res.data.map(t => {
                let perc = (t.trenutno / t.max) * 100;
                return `
                <div class="col-md-6 col-lg-4">
                    <div class="card p-3 h-100">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="badge bg-primary-subtle text-primary">${t.vrijeme}</span>
                            <small class="text-muted fw-bold">${t.bus}</small>
                        </div>
                        <h5 class="fw-bold mb-3">${t.ruta}</h5>
                        <div class="input-group mb-3">
                            <input type="number" id="in-${t.row}" class="form-control" placeholder="Br. putnika">
                            <button class="btn btn-primary" onclick="addTourists(${t.row})">DODAJ</button>
                        </div>
                        <div class="d-flex justify-content-between small mb-1">
                            <span>Popunjeno: ${t.trenutno} / ${t.max}</span>
                            <span class="fw-bold">${Math.round(perc)}%</span>
                        </div>
                        <div class="progress"><div class="progress-bar" style="width: ${perc}%"></div></div>
                    </div>
                </div>`;
            }).join('');
        }

        async function loadAdmin() {
            const res = await apiCall({ action: "getTemplate" });
            if(!res) return;
            document.getElementById('adminTableBody').innerHTML = res.data.map((t, i) => `
                <tr>
                    <td class="text-start small fw-bold">${t.ruta}<br><span class="text-muted font-monospace">${t.vrijeme}</span></td>
                    ${[0,1,2,3,4,5,6].map(d => `<td><input type="checkbox" class="form-check-input day-check" checked data-t="${i}" data-d="${d}"></td>`).join('')}
                </tr>`).join('');
        }

        async function generateWeek() {
            const checks = [...document.querySelectorAll('.day-check:checked')].map(c => ({ tourIndex: c.dataset.t, dayIndex: c.dataset.d }));
            const res = await apiCall({ action: "generateWeek", selekcija: checks });
            if(res) { alert(res.message); showSection('op'); }
        }

        async function addTourists(rowId) {
            const val = document.getElementById('in-' + rowId).value;
            if(!val) return;
            const res = await apiCall({ action: "addTourists", rowId, count: val });
            if(res) loadOperater();
        }

        function showSection(id) {
            document.getElementById('sec-op').style.display = id === 'op' ? 'block' : 'none';
            document.getElementById('sec-ad').style.display = id === 'ad' ? 'block' : 'none';
            document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            id === 'op' ? loadOperater() : loadAdmin();
        }

        window.onload = () => loadOperater();
    </script>
</body>
</html>
