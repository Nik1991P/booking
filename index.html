<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hop on Hop Off Menager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; }
        .navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 1rem 0; }
        .nav-link { color: #64748b !important; font-weight: 600; cursor: pointer; border: none !important; background: none !important; }
        .nav-link.active { color: var(--primary) !important; border-bottom: 2px solid var(--primary) !important; border-radius: 0; }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .tour-card { border-left: 4px solid var(--primary) !important; }
        .limit-alert { display: none; color: #ef4444; font-weight: bold; font-size: 0.85rem; margin-top: 10px; padding: 8px; background: #fee2e2; border-radius: 8px; border: 1px solid #fca5a5; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.4); z-index:9999; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner-border text-primary"></div></div>

    <nav class="navbar sticky-top mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand fw-bold text-primary">Hop on Hop Off Menager</span>
            <div class="nav nav-pills gap-3">
                <a class="nav-link active" id="btn-op" onclick="showSection('op')">Korisnik</a>
                <a class="nav-link" id="btn-ad" onclick="showSection('ad')">Administracija</a>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <div id="sec-op">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0">Pregled tura</h4>
                <input type="date" id="datePickerOp" class="form-control w-auto border-primary" onchange="loadOperater()">
            </div>
            <div class="row g-4" id="cardsContainer"></div>
        </div>

        <div id="sec-ad" style="display:none">
            <div class="row">
                <div class="col-lg-4 px-3">
                    <div class="card p-4 mb-4">
                        <h5 class="fw-bold mb-3">Tjedni plan</h5>
                        <div id="busChecklist" class="mb-4 d-flex flex-column gap-2"></div>
                        <div class="d-grid gap-2 mb-3">
                            <button class="btn btn-outline-secondary fw-bold" onclick="addMarkedBuses()">+ DODAJ OZNAČENO</button>
                            <button class="btn btn-primary fw-bold" onclick="previewFiveDays()">GENERIRAJ (5 DANA)</button>
                        </div>
                        <div class="pt-3 border-top">
                            <button class="btn btn-outline-primary w-100 mb-2 fw-bold" onclick="saveAdmin('append')">SPREMI (Dodaj)</button>
                            <button class="btn btn-danger w-100 fw-bold" onclick="saveAdmin('overwrite')">SPREMI IZMJENE (Update)</button>
                        </div>
                    </div>
                </div>
                <div class="col-lg-8">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold m-0">Kalendar / Uređivanje</h5>
                        <input type="date" id="datePickerAd" class="form-control w-auto border-primary" onchange="fetchAdminByDate()">
                    </div>
                    <div id="calendarDisplay"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlydrjJM-CQBjRfrY1PhiABB5ua9CyhpnzHiBgp8cOW-xLsK6ffItr4zNF_gl_0PIalQ/exec";
        const weeklyTemplate = [
            {vrijeme: "09:00", ruta: "Ruta 1", bus: "Bus 1", cap: 50},
            {vrijeme: "10:30", ruta: "Ruta 2", bus: "Bus 2", cap: 20},
            {vrijeme: "12:00", ruta: "Ruta 3", bus: "Bus 3", cap: 50},
            {vrijeme: "15:00", ruta: "Ruta 4", bus: "Bus 4", cap: 30}
        ];
        let tempSchedule = [];

        async function api(data) {
            document.getElementById('loader').style.display = 'flex';
            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                return await r.json();
            } catch (e) { return { status: "error" }; }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            // Ako već postoji odabran datum u memoriji, koristi njega, inače današnji
            document.getElementById('datePickerOp').value = sessionStorage.getItem('lastDate') || today;
            document.getElementById('datePickerAd').value = sessionStorage.getItem('lastDate') || today;
            loadOperater();
        };

        async function loadOperater() {
            const date = document.getElementById('datePickerOp').value;
            sessionStorage.setItem('lastDate', date); // Pamti datum
            const res = await api({ action: "getTours", date: date });
            const container = document.getElementById('cardsContainer');
            if(!res.data || res.data.length === 0) {
                container.innerHTML = '<div class="col-12 text-center py-5">Nema vožnji.</div>';
                return;
            }
            container.innerHTML = res.data.map(t => `
                <div class="col-md-6">
                    <div class="card p-4 tour-card">
                        <div class="d-flex justify-content-between mb-2">
                            <h3 class="fw-bold m-0">${t.vrijeme}</h3>
                            <span class="badge bg-primary-subtle text-primary p-2 px-3">${t.ruta}</span>
                        </div>
                        <p class="text-muted fw-medium mb-3">${t.bus}</p>
                        <div class="input-group mb-2">
                            <input type="number" id="in-${t.row}" class="form-control" placeholder="Broj">
                            <button class="btn btn-primary fw-bold" onclick="updateTourists(${t.row}, 'add', ${t.max})">DODAJ</button>
                            <button class="btn btn-outline-danger fw-bold" onclick="updateTourists(${t.row}, 'sub', ${t.max})">ODUZMI</button>
                        </div>
                        <div class="small fw-bold">Popunjeno: <span id="count-${t.row}">${t.trenutno}</span> / ${t.max}</div>
                        <div id="alert-${t.row}" class="limit-alert">!!! PREKORAČENJE !!! Slobodno još samo: <span id="rem-${t.row}"></span></div>
                    </div>
                </div>`).join('');
        }

        async function updateTourists(rowId, mode, max) {
            const displayEl = document.getElementById('count-' + rowId);
            const alertEl = document.getElementById('alert-' + rowId);
            const remEl = document.getElementById('rem-' + rowId);
            const inputEl = document.getElementById('in-' + rowId);
            const val = parseInt(inputEl.value) || 0;
            if(val <= 0) return;

            const currentVal = parseInt(displayEl.innerText) || 0;
            alertEl.style.display = 'none';

            if(mode === 'add' && (currentVal + val > max)) {
                remEl.innerText = (max - currentVal);
                alertEl.style.display = 'block';
                return;
            }

            // OPTIMISTIČKO AŽURIRANJE: Promijeni brojku ODMAH na ekranu
            const instantNewVal = mode === 'add' ? currentVal + val : currentVal - val;
            displayEl.innerText = instantNewVal;
            inputEl.value = "";

            // Zatim pošalji u pozadini na server
            api({ action: "addTourists", rowId, count: (mode === 'add' ? val : -val) });
        }

        async function saveAdmin(type) {
            const action = type === 'append' ? "saveAppend" : "saveOverwrite";
            await api({ action: action, finalData: tempSchedule });
            // Nema pop-upa, samo osvježi prikaz
            fetchAdminByDate();
        }

        function showSection(id) {
            document.getElementById('sec-op').style.display = id === 'op' ? 'block' : 'none';
            document.getElementById('sec-ad').style.display = id === 'ad' ? 'block' : 'none';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'op') loadOperater(); else loadAdmin();
        }

        // Ostale admin funkcije (checklist, preview, render) su iste kao prije...
        function loadAdmin() {
            document.getElementById('busChecklist').innerHTML = weeklyTemplate.map((t, i) => `
                <div class="form-check p-2 border rounded small">
                    <input class="form-check-input ms-1" type="checkbox" data-t="${i}" id="chk${i}">
                    <label class="form-check-label ms-2" for="chk${i}">${t.bus} (${t.vrijeme})</label>
                </div>`).join('');
            fetchAdminByDate();
        }

        async function fetchAdminByDate() {
            const date = document.getElementById('datePickerAd').value;
            sessionStorage.setItem('lastDate', date);
            const res = await api({ action: "getTours", date: date });
            tempSchedule = (res.data || []).map(t => ({
                tempId: Math.random().toString(36).substr(2, 9),
                dateISO: t.datum,
                datum: new Date(t.datum).toLocaleDateString('hr-HR'),
                vrijeme: t.vrijeme, ruta: t.ruta, bus: t.bus, max: t.max
            }));
            renderAdmin();
        }

        function renderAdmin() {
            const container = document.getElementById('calendarDisplay');
            if(tempSchedule.length === 0) {
                container.innerHTML = '<div class="text-muted p-4 border rounded bg-white">Nema podataka.</div>';
                return;
            }
            const grouped = tempSchedule.reduce((acc, t) => { 
                acc[t.datum] = acc[t.datum] || []; acc[t.datum].push(t); return acc; 
            }, {});
            container.innerHTML = Object.keys(grouped).map(date => `
                <div class="card p-3 mb-3">
                    <h6 class="fw-bold border-bottom pb-2">${date}</h6>
                    <div class="row g-2">${grouped[date].map(t => `
                        <div class="col-md-6"><div class="p-2 border rounded d-flex justify-content-between align-items-center bg-light">
                        <span class="small fw-bold">${t.vrijeme} | ${t.bus}</span>
                        <button class="btn btn-sm text-danger" onclick="removeTemp('${t.tempId}')">✕</button></div></div>`).join('')}
                    </div>
                </div>`).join('');
        }
        
        function previewFiveDays() {
            const startStr = document.getElementById('datePickerAd').value;
            let start = new Date(startStr);
            tempSchedule = [];
            for (let d = 0; d < 5; d++) {
                let dDate = new Date(start); dDate.setDate(start.getDate() + d);
                weeklyTemplate.forEach(t => {
                    tempSchedule.push({
                        tempId: Math.random().toString(36).substr(2, 9),
                        dateISO: dDate.toISOString().split('T')[0],
                        datum: dDate.toLocaleDateString('hr-HR'),
                        vrijeme: t.vrijeme, ruta: t.ruta, bus: t.bus, max: t.cap
                    });
                });
            }
            renderAdmin();
        }

        function addMarkedBuses() {
            const dateStr = document.getElementById('datePickerAd').value;
            const selectedIndices = [...document.querySelectorAll('.form-check-input:checked')].map(c => parseInt(c.dataset.t));
            const dDate = new Date(dateStr);
            selectedIndices.forEach(idx => {
                let t = weeklyTemplate[idx];
                tempSchedule.push({
                    tempId: Math.random().toString(36).substr(2, 9),
                    dateISO: dDate.toISOString().split('T')[0],
                    datum: dDate.toLocaleDateString('hr-HR'),
                    vrijeme: t.vrijeme, ruta: t.ruta, bus: t.bus, max: t.cap
                });
            });
            renderAdmin();
        }
        
        function removeTemp(id) {
            tempSchedule = tempSchedule.filter(x => x.tempId !== id);
            renderAdmin();
        }
    </script>
</body>
</html>
