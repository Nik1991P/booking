<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adriatic Transport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; }
        
        .navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 1rem 0; }
        /* SKLONJEN HOVER S DUGMIĆA */
        .nav-link { color: #64748b !important; font-weight: 600; cursor: pointer; border: none !important; background: none !important; }
        .nav-link:hover { color: #64748b !important; background: none !important; }
        .nav-link.active { color: var(--primary) !important; border-bottom: 2px solid var(--primary) !important; border-radius: 0; }
        
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .tour-card { border-left: 4px solid var(--primary) !important; }
        .calendar-day-box { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 15px; }
        .temp-tour-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-remove { color: #ef4444; background: none; border: none; font-size: 1.2rem; cursor: pointer; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.7); z-index:9999; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner-border text-primary"></div></div>

    <nav class="navbar sticky-top mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand fw-bold text-primary">AdriaticTransport</span>
            <div class="nav nav-pills gap-3">
                <a class="nav-link active" id="btn-op" onclick="showSection('op')">Korisnik</a>
                <a class="nav-link" id="btn-ad" onclick="showSection('ad')">Administracija</a>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <!-- KORISNIK -->
        <div id="sec-op">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0">Pregled tura</h4>
                <input type="date" id="datePickerOp" class="form-control w-auto border-primary" onchange="loadOperater()">
            </div>
            <div class="row g-4" id="cardsContainer"></div>
        </div>

        <!-- ADMIN -->
        <div id="sec-ad" style="display:none">
            <div class="row">
                <div class="col-lg-4">
                    <div class="card p-4 mb-4 shadow-sm">
                        <h5 class="fw-bold mb-3">Tjedni plan</h5>
                        <div id="busChecklist" class="mb-4 d-flex flex-column gap-2"></div>
                        <button class="btn btn-primary w-100 py-2 fw-bold" onclick="previewSchedule()">GENERIRAJ TJEDAN</button>
                        
                        <div id="adminActions" class="mt-4 pt-3 border-top" style="display:none">
                            <button class="btn btn-outline-primary w-100 mb-2 fw-bold" onclick="saveAdmin('append')">SPREMI (Dodaj)</button>
                            <button class="btn btn-danger w-100 fw-bold" onclick="saveAdmin('overwrite')">SPREMI IZMJENE (Update)</button>
                        </div>
                    </div>
                </div>
                <div class="col-lg-8">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold m-0">Pregled po datumu</h5>
                        <input type="date" id="datePickerAd" class="form-control w-auto border-primary" onchange="fetchAdminByDate()">
                    </div>
                    <div id="calendarDisplay"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwuunxhJTvrQlj0S0rj5sddozQCiQcwQXBDv_gMzJf-zRT4rCIfY_f2npfD7b7pMDYFGA/exec";
        const weeklyTemplate = [
            {vrijeme: "09:00", ruta: "Ruta 1", bus: "Bus 1", cap: 50},
            {vrijeme: "10:30", ruta: "Ruta 2", bus: "Bus 2", cap: 20},
            {vrijeme: "12:00", ruta: "Ruta 3", bus: "Bus 3", cap: 50},
            {vrijeme: "15:00", ruta: "Ruta 4", bus: "Bus 4", cap: 30}
        ];
        let tempSchedule = [];

        async function api(data) {
            document.getElementById('loader').style.display = 'flex';
            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                return await r.json();
            } catch (e) { return { status: "error" }; }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('datePickerOp').value = today;
            document.getElementById('datePickerAd').value = today;
            loadOperater();
        };

        // --- KORISNIK (Vraćen CRVENI alert) ---
        async function loadOperater() {
            const date = document.getElementById('datePickerOp').value;
            const res = await api({ action: "getTours", date: date });
            const container = document.getElementById('cardsContainer');
            if(!res.data || res.data.length === 0) {
                container.innerHTML = '<div class="col-12 text-center py-5">Nema vožnji za odabrani datum.</div>';
                return;
            }
            container.innerHTML = res.data.map(t => `
                <div class="col-md-6">
                    <div class="card p-4 tour-card">
                        <div class="d-flex justify-content-between mb-2">
                            <h3 class="fw-bold m-0">${t.vrijeme}</h3>
                            <span class="badge bg-primary-subtle text-primary p-2 px-3">${t.ruta}</span>
                        </div>
                        <p class="text-muted fw-medium mb-3">${t.bus}</p>
                        <div class="input-group mb-2">
                            <input type="number" id="in-${t.row}" class="form-control" placeholder="Broj">
                            <button class="btn btn-primary fw-bold" onclick="updateTourists(${t.row}, 'add', ${t.max}, ${t.trenutno})">DODAJ</button>
                            <button class="btn btn-outline-danger fw-bold" onclick="updateTourists(${t.row}, 'sub', ${t.max}, ${t.trenutno})">ODUZMI</button>
                        </div>
                        <div class="small fw-bold">Popunjeno: ${t.trenutno} / ${t.max}</div>
                    </div>
                </div>`).join('');
        }

        async function updateTourists(rowId, mode, max, current) {
            const val = parseInt(document.getElementById('in-' + rowId).value) || 0;
            if(val <= 0) return;
            if(mode === 'add' && (current + val > max)) {
                // STROGI CRVENI ALERT
                alert("!!! PREKORAČENJE !!!\nMaksimalan broj putnika je " + max + ".\nSlobodno još samo: " + (max - current));
                return;
            }
            await api({ action: "addTourists", rowId, count: mode === 'add' ? val : -val });
            loadOperater();
        }

        // --- ADMIN (Prikaz zadnjeg spremljenog + Kalendar) ---
        function loadAdmin() {
            document.getElementById('busChecklist').innerHTML = weeklyTemplate.map((t, i) => `
                <div class="form-check p-2 border rounded">
                    <input class="form-check-input ms-1" type="checkbox" checked data-t="${i}" id="chk${i}">
                    <label class="form-check-label ms-2" for="chk${i}">${t.bus} (${t.vrijeme})</label>
                </div>`).join('');
            fetchAdminByDate(); // Odmah učitaj današnje ture iz baze
        }

        async function fetchAdminByDate() {
            const date = document.getElementById('datePickerAd').value;
            const res = await api({ action: "getTours", date: date });
            tempSchedule = []; // Čistimo preview jer gledamo bazu
            document.getElementById('adminActions').style.display = 'none';
            renderAdmin(res.data, true);
        }

        function previewSchedule() {
            const selectedIndices = [...document.querySelectorAll('.form-check-input:checked')].map(c => parseInt(c.dataset.t));
            tempSchedule = [];
            let start = new Date();
            for (let d = 0; d < 7; d++) {
                let dDate = new Date(start); dDate.setDate(start.getDate() + d);
                selectedIndices.forEach(idx => {
                    let t = weeklyTemplate[idx];
                    tempSchedule.push({
                        tempId: Math.random().toString(36).substr(2, 9),
                        dateISO: dDate.toISOString(),
                        datum: dDate.toLocaleDateString('hr-HR'),
                        vrijeme: t.vrijeme, ruta: t.ruta, bus: t.bus, max: t.cap
                    });
                });
            }
            document.getElementById('adminActions').style.display = 'block';
            renderAdmin(tempSchedule, false);
        }

        function renderAdmin(tours, isDB) {
            const container = document.getElementById('calendarDisplay');
            if(!tours || tours.length === 0) {
                container.innerHTML = '<div class="text-muted p-4 border rounded bg-white">Nema tura u bazi za ovaj datum.</div>';
                return;
            }
            const grouped = tours.reduce((acc, t) => { 
                const d = isDB ? new Date(t.datum).toLocaleDateString('hr-HR') : t.datum;
                acc[d] = acc[d] || []; acc[d].push(t); return acc; 
            }, {});
            
            container.innerHTML = Object.keys(grouped).map(date => `
                <div class="calendar-day-box">
                    <h6 class="fw-bold border-bottom pb-2">${isDB ? 'IZ EXCELA: ' : ''}${date}</h6>
                    <div class="row g-2">
                        ${grouped[date].map(t => `
                            <div class="col-md-6">
                                <div class="temp-tour-item ${isDB ? 'bg-success-subtle' : ''}">
                                    <span class="small fw-bold">${t.vrijeme} | ${t.bus}</span>
                                    ${!isDB ? `<button class="btn-remove" onclick="removeTemp('${t.tempId}')">✕</button>` : ''}
                                </div>
                            </div>`).join('')}
                    </div>
                </div>`).join('');
        }

        function removeTemp(id) {
            tempSchedule = tempSchedule.filter(x => x.tempId !== id);
            renderAdmin(tempSchedule, false);
        }

        async function saveAdmin(type) {
            const action = type === 'append' ? "saveAppend" : "saveOverwrite";
            const res = await api({ action: action, finalData: tempSchedule });
            alert(res.message);
            fetchAdminByDate(); // Nakon spremanja osvježi prikaz iz baze
        }

        function showSection(id) {
            document.getElementById('sec-op').style.display = id === 'op' ? 'block' : 'none';
            document.getElementById('sec-ad').style.display = id === 'ad' ? 'block' : 'none';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'op') loadOperater(); else loadAdmin();
        }
    </script>
</body>
</html>
