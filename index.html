<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hop on Hop off Dubrpvnik Menager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --success: #10b981; }
        body { background-color: var(--bg); font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        
        .navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 1rem 0; }
        .nav-link { color: #64748b !important; font-weight: 600; cursor: pointer; border: none !important; }
        .nav-link.active { color: var(--primary) !important; border-bottom: 2px solid var(--primary) !important; border-radius: 0; }

        /* Vraćen originalni stil kartica za Korisnika */
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .tour-card { border-left: 4px solid var(--primary) !important; }
        .tour-card.full { border-left-color: #ef4444 !important; }
        
        .calendar-day-box { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 15px; }
        .temp-tour-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-remove { color: #ef4444; background: none; border: none; font-size: 1.2rem; cursor: pointer; }
        .over-limit-msg { color: #dc2626; font-size: 0.85rem; font-weight: bold; display: none; margin-top: 5px; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.7); z-index:9999; justify-content:center; align-items:center; }
        .progress { height: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner-border text-primary"></div></div>

    <nav class="navbar sticky-top mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand fw-bold text-primary">AdriaticTransport</span>
            <div class="nav nav-pills gap-3">
                <a class="nav-link active" id="btn-op" onclick="showSection('op')">Korisnik</a>
                <a class="nav-link" id="btn-ad" onclick="showSection('ad')">Administracija</a>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <!-- KORISNIK SEKCIJA -->
        <div id="sec-op">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0">Današnje ture</h4>
                <span id="currentDateDisplay" class="badge bg-white text-dark border p-2"></span>
            </div>
            <div class="row g-4" id="cardsContainer"></div>
        </div>

        <!-- ADMIN SEKCIJA -->
        <div id="sec-ad" style="display:none">
            <div class="row">
                <div class="col-lg-4">
                    <div class="card p-4 mb-4">
                        <h5 class="fw-bold mb-3">Tjedni plan</h5>
                        <div id="busChecklist" class="mb-4 d-flex flex-column gap-2"></div>
                        <button class="btn btn-primary w-100 py-2 fw-bold" onclick="previewSchedule()">GENERIRAJ PREGLED</button>
                        <div id="saveArea" style="display:none;" class="mt-4 pt-3 border-top">
                            <button class="btn btn-success w-100 py-3 fw-bold shadow-sm" onclick="saveFinal()">SPREMI U TABLICU</button>
                        </div>
                    </div>
                </div>
                <div class="col-lg-8">
                    <h5 class="fw-bold mb-3">Pregled i uređivanje</h5>
                    <div id="calendarDisplay"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyrA1UnLN8k4964DG2YBz-yalnBHx7cDo8FtsKDHTuhJJg5uxE1ICgXRP8PPjBP2pAeUw/exec"; 

        // Tvoj fiksni tjedni plan (ovdje možeš dodati/mijenjati ture)
        const weeklyTemplate = [
            {vrijeme: "09:00", ruta: "Ruta 1", bus: "Bus 1", cap: 50},
            {vrijeme: "10:30", ruta: "Ruta 2", bus: "Bus 2", cap: 20},
            {vrijeme: "12:00", ruta: "Ruta 3", bus: "Bus 3", cap: 50},
            {vrijeme: "15:00", ruta: "Ruta 4", bus: "Bus 4", cap: 30}
        ];

        let tempSchedule = [];

        async function api(data) {
            document.getElementById('loader').style.display = 'flex';
            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                return await r.json();
            } catch (e) { return { status: "error" }; }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        // --- KORISNIK ---
        async function loadOperater() {
            document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('hr-HR');
            const res = await api({ action: "getTodayTours" });
            const container = document.getElementById('cardsContainer');
            
            if(!res.data || res.data.length === 0) {
                container.innerHTML = '<div class="col-12 text-center py-5 text-muted">Nema aktivnih vožnji za danas.</div>';
                return;
            }

            container.innerHTML = res.data.map(t => {
                let perc = (t.trenutno / t.max) * 100;
                let cleanTime = String(t.vrijeme).includes(' ') ? String(t.vrijeme).split(' ')[4].substring(0,5) : t.vrijeme;

                return `
                <div class="col-md-6">
                    <div class="card p-4 h-100 tour-card ${perc >= 100 ? 'full' : ''}">
                        <div class="d-flex justify-content-between mb-2">
                            <h3 class="fw-bold m-0">${cleanTime}</h3>
                            <span class="badge bg-primary-subtle text-primary p-2 px-3">${t.ruta}</span>
                        </div>
                        <p class="text-muted fw-medium mb-3">${t.bus}</p>
                        
                        <div class="input-group mb-2">
                            <input type="number" id="in-${t.row}" class="form-control form-control-lg" placeholder="Broj">
                            <button class="btn btn-primary fw-bold" id="btn-add-${t.row}" onclick="updateTourists(${t.row}, 'add', ${t.max}, ${t.trenutno})">DODAJ</button>
                            <button class="btn btn-outline-danger fw-bold" onclick="updateTourists(${t.row}, 'sub', ${t.max}, ${t.trenutno})">ODUZMI</button>
                        </div>
                        <div id="msg-${t.row}" class="over-limit-msg">⚠️ Kapacitet buza bi bio prekoračen!</div>

                        <div class="mt-4">
                            <div class="d-flex justify-content-between small mb-1 fw-bold">
                                <span>Popunjeno: ${t.trenutno} / ${t.max}</span>
                                <span>${Math.round(perc)}%</span>
                            </div>
                            <div class="progress bg-light">
                                <div class="progress-bar ${perc >= 100 ? 'bg-danger' : 'bg-primary'}" style="width: ${Math.min(perc, 100)}%"></div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function updateTourists(rowId, mode, max, current) {
            const input = document.getElementById('in-' + rowId);
            const val = parseInt(input.value) || 0;
            if(val <= 0) return;

            const finalCount = mode === 'add' ? val : -val;

            // Provjera limita samo kod dodavanja
            if(mode === 'add' && (current + val > max)) {
                document.getElementById('msg-' + rowId).style.display = 'block';
                return;
            }

            await api({ action: "addTourists", rowId, count: finalCount });
            loadOperater();
        }

        // --- ADMIN ---
        function loadAdmin() {
            document.getElementById('busChecklist').innerHTML = weeklyTemplate.map((t, i) => `
                <div class="form-check form-switch bg-white p-2 px-5 rounded border">
                    <input class="form-check-input bus-check" type="checkbox" checked data-t="${i}" id="chk${i}">
                    <label class="form-check-label fw-medium" for="chk${i}">${t.bus} (${t.vrijeme})</label>
                </div>
            `).join('');
            fetchCurrentDB();
        }

        async function fetchCurrentDB() {
            const res = await api({ action: "getAdminView" });
            renderCurrent(res.data);
        }

        function previewSchedule() {
            const selectedIndices = [...document.querySelectorAll('.bus-check:checked')].map(c => parseInt(c.dataset.t));
            tempSchedule = [];
            let start = new Date();
            
            for (let d = 0; d < 7; d++) {
                let dDate = new Date(start);
                dDate.setDate(start.getDate() + d);
                selectedIndices.forEach(idx => {
                    let t = weeklyTemplate[idx];
                    tempSchedule.push({
                        tempId: Math.random().toString(36).substr(2, 9),
                        dateISO: dDate.toISOString(),
                        datum: dDate.toLocaleDateString('hr-HR'),
                        vrijeme: t.vrijeme, ruta: t.ruta, bus: t.bus, max: t.cap
                    });
                });
            }
            document.getElementById('saveArea').style.display = 'block';
            renderPreview();
        }

        function renderPreview() {
            const container = document.getElementById('calendarDisplay');
            const grouped = tempSchedule.reduce((acc, t) => { acc[t.datum] = acc[t.datum] || []; acc[t.datum].push(t); return acc; }, {});
            
            container.innerHTML = '<div class="alert alert-info py-2 small fw-bold mb-3">NOVI PLAN (PREGLED):</div>' + 
                Object.keys(grouped).map(date => `
                <div class="calendar-day-box shadow-sm">
                    <h6 class="fw-bold text-primary mb-3 border-bottom pb-2">${date}</h6>
                    <div class="row g-2">
                        ${grouped[date].map(t => `
                            <div class="col-md-6">
                                <div class="temp-tour-item">
                                    <span class="small fw-bold">${t.vrijeme} | ${t.bus}</span>
                                    <button class="btn-remove" onclick="removeTemp('${t.tempId}')">✕</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function removeTemp(id) {
            tempSchedule = tempSchedule.filter(x => x.tempId !== id);
            renderPreview();
        }

        async function saveFinal() {
            if(!confirm("Ovo briše sve trenutno i sprema novo. Sigurni?")) return;
            const res = await api({ action: "saveFinalSchedule", finalData: tempSchedule });
            alert(res.message);
            tempSchedule = [];
            showSection('ad');
        }

        function renderCurrent(tours) {
            const container = document.getElementById('calendarDisplay');
            if(!tours || tours.length === 0) { container.innerHTML = '<p class="text-muted">Nema tura.</p>'; return; }
            
            const grouped = tours.reduce((acc, t) => { acc[t.datum] = acc[t.datum] || []; acc[t.datum].push(t); return acc; }, {});
            
            container.innerHTML = '<div class="fw-bold text-success mb-2">● TRENUTNO AKTIVNO:</div>' + 
                Object.keys(grouped).map(date => `
                <div class="calendar-day-box border-start border-4 border-success">
                    <h6 class="fw-bold">${date}</h6>
                    <div class="row g-2 mt-2">
                        ${grouped[date].map(t => {
                            let cleanTime = String(t.vrijeme).includes(' ') ? String(t.vrijeme).split(' ')[4].substring(0,5) : t.vrijeme;
                            return `<div class="col-md-6"><div class="p-2 bg-light rounded small fw-bold">${cleanTime} | ${t.bus}</div></div>`
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function showSection(id) {
            document.getElementById('sec-op').style.display = id === 'op' ? 'block' : 'none';
            document.getElementById('sec-ad').style.display = id === 'ad' ? 'block' : 'none';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'op') loadOperater(); else loadAdmin();
        }

        window.onload = () => loadOperater();
    </script>
</body>
</html>
