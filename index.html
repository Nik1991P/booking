<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --primary: #0d6efd; --bg: #f0f2f5; }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: 0.3s; }
        .tour-card:hover { transform: translateY(-3px); }
        .progress { height: 10px; border-radius: 5px; }
        .loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 9999; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="loader" class="loader-overlay"><div class="spinner-border text-primary"></div></div>

<nav class="navbar navbar-dark bg-primary shadow mb-4">
    <div class="container text-center"><span class="navbar-brand fw-bold mx-auto">BUS TOURS MANAGER</span></div>
</nav>

<div class="container">
    <ul class="nav nav-pills justify-content-center mb-4" id="pills-tab">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-op" onclick="loadOperater()"><i class="bi bi-person-badge"></i> Operater</button></li>
        <li class="nav-item ms-2"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-ad"><i class="bi bi-gear"></i> Admin</button></li>
    </ul>

    <div class="tab-content">
        <!-- OPERATER -->
        <div class="tab-pane fade show active" id="tab-op">
            <h5 class="text-center text-muted mb-4" id="dateLabel"></h5>
            <div id="cardsContainer" class="row g-3">
                <p class="text-center">Učitavanje današnjih tura...</p>
            </div>
        </div>

        <!-- ADMIN -->
        <div class="tab-pane fade" id="tab-ad">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="mb-0">Tjedni Planer</h5>
                    <button class="btn btn-success fw-bold" onclick="generateWeek()">GENERIRAJ TJEDAN</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-sm align-middle text-center">
                        <thead class="table-dark"><tr><th>Tura</th><th>P</th><th>U</th><th>S</th><th>Č</th><th>P</th><th>S</th><th>N</th></tr></thead>
                        <tbody id="adminTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = () => {
        loadAdminTable();
        loadOperater();
    };

    function loadAdminTable() {
        google.script.run.withSuccessHandler(tours => {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = tours.map((t, tIdx) => `
                <tr>
                    <td class="text-start small fw-bold">${t.vrijeme}<br><span class="text-muted" style="font-size:0.7rem">${t.ruta}</span></td>
                    ${[0,1,2,3,4,5,6].map(d => `<td><input type="checkbox" class="form-check-input day-check" checked data-t="${tIdx}" data-d="${d}"></td>`).join('')}
                </tr>
            `).join('');
        }).getWeeklyTemplate();
    }

    function loadOperater() {
        document.getElementById('dateLabel').innerText = "Danas: " + new Date().toLocaleDateString('hr-HR');
        google.script.run.withSuccessHandler(renderCards).getTodayTours();
    }

    function renderCards(tours) {
        const container = document.getElementById('cardsContainer');
        if(tours.length === 0) { container.innerHTML = '<p class="text-center">Nema tura za danas. Admin mora generirati raspored.</p>'; return; }
        
        container.innerHTML = tours.map(t => {
            const perc = (t.trenutno / t.max) * 100;
            const color = perc > 90 ? 'danger' : perc > 70 ? 'warning' : 'success';
            return `
                <div class="col-md-6 col-lg-4">
                    <div class="card tour-card p-3 border-start border-5 border-${color}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div><h6 class="mb-0">${t.ruta}</h6><small class="text-muted">${t.bus}</small></div>
                            <span class="badge bg-primary">${t.vrijeme}</span>
                        </div>
                        <div class="mt-3 p-2 bg-light rounded">
                            <div class="d-flex gap-2">
                                <input type="number" id="in-${t.row}" class="form-control form-control-sm" placeholder="+ Dodaj br. turista">
                                <button class="btn btn-sm btn-primary" onclick="updateTour(${t.row})">DODAJ</button>
                            </div>
                            <div class="mt-2 small d-flex justify-content-between">
                                <span>Popunjeno: <strong>${t.trenutno}</strong> / ${t.max}</span>
                                <span>Još: <strong>${t.max - t.trenutno}</strong></span>
                            </div>
                            <div class="progress mt-1"><div class="progress-bar bg-${color}" style="width:${perc}%"></div></div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateTour(rowId) {
        const val = document.getElementById('in-' + rowId).value;
        if(!val || val <= 0) return alert("Unesite ispravan broj");
        
        toggleLoader(true);
        google.script.run
            .withSuccessHandler(res => {
                toggleLoader(false);
                alert("Uspješno dodano! Ukupno bukiranih: " + res.noviUkupno);
                loadOperater();
            })
            .withFailureHandler(err => {
                toggleLoader(false);
                alert("GREŠKA: " + err);
            })
            .addTourists(rowId, val);
    }

    function generateWeek() {
        const checks = [...document.querySelectorAll('.day-check:checked')].map(c => ({ tourIndex: c.dataset.t, dayIndex: c.dataset.d }));
        toggleLoader(true);
        google.script.run.withSuccessHandler(res => {
            toggleLoader(false);
            alert(res);
            loadOperater();
        }).generateToursInSheet(checks);
    }

    function toggleLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
</script>
</body>
</html>
