<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .nav-pills .nav-link.active { background-color: #0d6efd; border-radius: 20px; }
        .admin-table { background: white; border-radius: 12px; overflow: hidden; font-size: 0.85rem; }
        .admin-table th { background: #0d6efd; color: white; text-align: center; }
        .day-check { transform: scale(1.2); }
        .tour-row:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container py-4">
    <!-- Navigacija -->
    <ul class="nav nav-pills justify-content-center mb-4" id="pills-tab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="operater-tab" data-bs-toggle="pill" data-bs-target="#pills-operater">
                <i class="bi bi-list-check me-1"></i> Operater
            </button>
        </li>
        <li class="nav-item ms-2">
            <button class="nav-link" id="admin-tab" data-bs-toggle="pill" data-bs-target="#pills-admin">
                <i class="bi bi-calendar-plus me-1"></i> Admin Planer
            </button>
        </li>
    </ul>

    <div class="tab-content">
        <!-- OPERATER SEKCIJA -->
        <div class="tab-pane fade show active" id="pills-operater">
            <h4 class="text-center mb-4">Današnje Ture</h4>
            <div id="operaterView" class="row g-3">
                <!-- Ovdje bi išle kartice koje smo ranije dizajnirali -->
                <div class="col-md-6 offset-md-3">
                    <div class="card p-3 shadow-sm border-0 border-start border-success border-5">
                        <div class="d-flex justify-content-between">
                            <strong>09:00 - Panorama Tour</strong>
                            <span class="text-muted">Bus: RI-101-AA</span>
                        </div>
                        <div class="input-group mt-2">
                            <input type="number" class="form-control" placeholder="Broj turista" value="12">
                            <button class="btn btn-primary">Spremi</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ADMIN SEKCIJA (Tjedna Matrica) -->
        <div class="tab-pane fade" id="pills-admin">
            <div class="card shadow-sm p-4 border-0">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4>Planiranje za naredni tjedan</h4>
                    <button class="btn btn-success btn-lg" onclick="generiraj()">
                        <i class="bi bi-cloud-upload me-2"></i>Generiraj sve ture
                    </button>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-bordered admin-table align-middle">
                        <thead>
                            <tr>
                                <th>Tura / Vrijeme</th>
                                <th>PON</th><th>UTO</th><th>SRI</th><th>ČET</th><th>PET</th><th>SUB</th><th>NED</th>
                            </tr>
                        </thead>
                        <tbody id="adminTableBody">
                            <!-- Popunjava se preko JavaScripta -->
                        </tbody>
                    </table>
                </div>
                <div class="alert alert-info mt-3 small">
                    <i class="bi bi-info-circle me-2"></i>
                    Označite ture koje želite kreirati. Za svaku označenu kvačicu, sustav će automatski otvoriti termin u glavnom rasporedu.
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Inicijalno učitavanje matice
    window.onload = function() {
        google.script.run.withSuccessHandler(buildAdminTable).getWeeklyTemplate();
    };

    function buildAdminTable(tours) {
        const tbody = document.getElementById('adminTableBody');
        tours.forEach((tour, index) => {
            let row = `<tr class="tour-row">
                <td class="p-3">
                    <div class="fw-bold">${tour.vrijeme}</div>
                    <div class="small text-muted">${tour.ruta}</div>
                    <div class="small text-primary">${tour.bus}</div>
                </td>`;
            
            // Dodaj kvačicu za svaki dan (7 dana)
            for(let i=0; i<7; i++) {
                row += `<td class="text-center">
                    <input type="checkbox" class="form-check-input day-check" checked data-tour="${index}" data-day="${i}">
                </td>`;
            }
            row += `</tr>`;
            tbody.innerHTML += row;
        });
    }

    function generiraj() {
        const checks = document.querySelectorAll('.day-check:checked');
        if(confirm(`Želite li generirati ${checks.length} termina za naredni tjedan?`)) {
            google.script.run.withSuccessHandler(res => {
                alert(res);
            }).saveWeeklySchedule([]); // Ovdje bi slali prave podatke
        }
    }
</script>
</body>
</html>
